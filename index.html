<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TORANO - THỜI TRANG CAO CẤP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      body {
        font-family: "Montserrat", sans-serif;
        background-color: #ffffff;
      }
      .luxury-heading {
        font-family: "Cormorant Garamond", serif;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body class="text-[#111111] antialiased">
    <div
      class="bg-[#111111] text-white text-[9px] font-light tracking-[0.35em] text-center py-2.5 uppercase"
    >
      BỘ SƯU TẬP 2026 • PHÂN PHỐI ĐỘC QUYỀN TOÀN QUỐC
    </div>

    <header
      class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-zinc-100"
    >
      <div
        class="container mx-auto px-6 md:px-12 h-24 flex items-center justify-between"
      >
        <div
          class="text-[10px] font-light tracking-[0.25em] text-zinc-400 uppercase hidden md:block"
        >
          Maison de Thiết kế Cao cấp
        </div>

        <a
          href="#"
          class="luxury-heading text-3xl md:text-4xl font-light tracking-[0.4em] text-black pl-0 md:pl-32"
          >TORANO</a
        >

        <div class="flex items-center space-x-8 text-sm text-zinc-800">
          <a href="#" class="hover:text-zinc-400 transition"
            ><i class="fa-solid fa-magnifying-glass"></i
          ></a>
          <a href="#" class="hover:text-zinc-400 transition"
            ><i class="fa-regular fa-user"></i
          ></a>
          <button
            onclick="toggleCart()"
            class="hover:text-zinc-400 transition relative flex items-center"
          >
            <span
              class="text-[10px] font-medium tracking-widest mr-1.5 hidden sm:inline"
              >GIỎ HÀNG</span
            >
            <i class="fa-solid fa-bag-shopping text-base"></i>
            <span
              id="cart-count"
              class="absolute -bottom-1 -right-2 bg-black text-white text-[8px] w-3.5 h-3.5 rounded-full flex items-center justify-center font-light"
              >0</span
            >
          </button>
        </div>
      </div>
    </header>

    <div
      class="relative bg-[#f5f5f5] h-[25vh] overflow-hidden flex items-center justify-center"
    >
      <div class="text-center max-w-2xl px-4 relative z-10">
        <span
          id="total-badge"
          class="text-[9px] uppercase tracking-[0.6em] mb-2 block font-light text-zinc-400"
          >Đang tải bộ sưu tập...</span
        >
        <h2
          class="luxury-heading text-3xl md:text-4xl font-light tracking-[0.25em] uppercase italic mb-3"
        >
          Danh Mục Sản Phẩm
        </h2>
        <div class="w-12 h-[1px] bg-zinc-300 mx-auto mt-4"></div>
      </div>
    </div>

    <main class="container mx-auto px-6 md:px-12 py-12">
      <div
        class="border-y border-zinc-200 py-4 mb-12 flex flex-col lg:flex-row gap-4 items-center justify-between text-[10px] tracking-widest font-light uppercase"
      >
        <div class="relative w-full lg:w-72 border-b border-zinc-300 py-1">
          <input
            type="text"
            id="search-input"
            oninput="boLocThongMinh()"
            placeholder="TÌM SẢN PHẨM..."
            class="w-full bg-transparent text-[10px] tracking-widest font-light uppercase focus:outline-none placeholder-zinc-300"
          />
        </div>

        <div
          class="flex flex-wrap w-full lg:w-auto gap-6 justify-end items-center"
        >
          <select
            id="gender-select"
            onchange="boLocThongMinh()"
            class="bg-transparent border-b border-transparent hover:border-black py-1 cursor-pointer focus:outline-none transition"
          >
            <option value="all">TẤT CẢ GIỚI TÍNH</option>
            <option value="nam">HOMME (NAM)</option>
            <option value="nu">FEMME (NỮ)</option>
          </select>

          <select
            id="type-select"
            onchange="boLocThongMinh()"
            class="bg-transparent border-b border-transparent hover:border-black py-1 cursor-pointer focus:outline-none transition"
          >
            <option value="all">TẤT CẢ PHÂN LOẠI</option>
            <option value="ao">ÁO THỜI TRANG</option>
            <option value="quan">QUẦN THỜI TRANG</option>
          </select>

          <select
            id="price-select"
            onchange="boLocThongMinh()"
            class="bg-transparent border-b border-transparent hover:border-black py-1 cursor-pointer focus:outline-none transition"
          >
            <option value="all">TẤT CẢ MỨC GIÁ</option>
            <option value="duoi-300">DƯỚI 300.000đ</option>
            <option value="300-600">300.000đ - 600.000đ</option>
            <option value="600-1000">600.000đ - 1.000.000đ</option>
            <option value="tren-1000">TRÊN 1.000.000đ</option>
          </select>
        </div>
      </div>

      <div
        id="products-grid"
        class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-6 gap-y-12"
      ></div>
    </main>

    <div id="cart-drawer" class="fixed inset-0 z-50 overflow-hidden hidden">
      <div
        class="absolute inset-0 bg-black/10 backdrop-blur-sm"
        onclick="toggleCart()"
      ></div>
      <div class="absolute inset-y-0 right-0 max-w-full flex">
        <div class="w-screen max-w-md bg-white flex flex-col shadow-2xl">
          <div
            class="px-8 py-6 border-b border-zinc-100 flex items-center justify-between"
          >
            <h2 class="text-xs font-light tracking-[0.3em] uppercase">
              TÚI MUA SẮM CỦA BẠN
            </h2>
            <button
              onclick="toggleCart()"
              class="text-zinc-400 hover:text-black text-2xl font-light transition"
            >
              &times;
            </button>
          </div>
          <div
            id="cart-items"
            class="flex-1 overflow-y-auto px-8 py-4 no-scrollbar space-y-6"
          ></div>
          <div class="border-t border-zinc-100 p-8 bg-zinc-50 space-y-6">
            <div
              class="flex justify-between text-xs tracking-widest font-light"
            >
              <span>TỔNG TIỀN TẠM TÍNH:</span>
              <span id="cart-total" class="font-medium">0đ</span>
            </div>
            <button
              onclick="datHang()"
              class="w-full bg-black text-white py-4 font-light text-[10px] tracking-[0.3em] uppercase hover:bg-zinc-800 transition duration-300"
            >
              TIẾN HÀNH ĐẶT HÀNG
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
